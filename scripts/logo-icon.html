<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0}
  /* 512x512 app-icon / avatar: everware mark on brand black, with the same
     dot-grid + blue glow language as scripts/og-image.html. */
  body{width:512px;height:512px;overflow:hidden;background:#050505;position:relative}
  .dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.07) 1px,transparent 1px);background-size:24px 24px}
  .glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:340px;background:radial-gradient(ellipse at center,rgba(59,130,246,.38),transparent 70%);filter:blur(30px)}
  .wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .mark{width:384px;height:auto;display:block;filter:drop-shadow(0 0 26px rgba(59,130,246,.45))}
</style>
</head>
