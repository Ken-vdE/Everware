name: deploy

on:
  push:
    branches: [staging, main]

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "service=everware-prod" >> "$GITHUB_OUTPUT"
          else
            echo "service=everware-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Telegram (start)
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="🚀 Deploy started: ${{ steps.env.outputs.service }} (${GITHUB_SHA::7}) by ${{ github.actor }}
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet
          IMAGE="europe-west4-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/everware/everware:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ steps.env.outputs.service }}
          region: europe-west4
          image: ${{ env.IMAGE }}

      - name: Notify Telegram (result)
        if: always()   # fire on success AND failure
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="${EMOJI} Deploy ${{ job.status }}: ${{ steps.env.outputs.service }} (${GITHUB_SHA::7})
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
